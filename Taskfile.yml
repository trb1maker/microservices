# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  SERVICES:
    - order-service
  DOCKER_TAG: dev
  COMPOSE_ENV_FILE: .env

tasks:
  ensure:env:
    desc: Создать .env из .env.example, если отсутствует
    cmds:
      - test -f {{.COMPOSE_ENV_FILE}} || cp .env.example {{.COMPOSE_ENV_FILE}}
    silent: true
  fmt:
    desc: Форматирование кода
    cmds:
      - golangci-lint fmt ./pkg/...
      - for: { var: SERVICES }
        cmd: golangci-lint fmt ./services/{{.ITEM}}/...
    silent: true

  lint:
    desc: Линтинг кода
    cmds:
      - for: { var: SERVICES }
        cmd: golangci-lint run ./pkg/... ./services/{{.ITEM}}/... --fix --max-same-issues=0
    silent: true

  test:unit:
    desc: Юнит-тестирование
    cmds:
      - go test -v -race ./pkg/...
      - for: { var: SERVICES }
        cmd: go test -v -race ./services/{{.ITEM}}/...
    silent: true

  test:integration:
    desc: Интеграционное тестирование
    cmds:
      - for: { var: SERVICES }
        cmd: go test -tags=integration -timeout 10m ./services/{{.ITEM}}/...
    silent: true

  build:
    desc: Сборка бинарников
    cmds:
      - for: { var: SERVICES }
        cmd: go build -o bin/{{.ITEM}} ./services/{{.ITEM}}/cmd/main.go
    silent: true

  run:
    desc: Запуск сервиса локально (task run SERVICE=order-service)
    requires:
      vars: [SERVICE]
    cmds:
      - go run ./services/{{.SERVICE}}/cmd/main.go
    silent: true

  docker:build:
    desc: Сборка dev-образов
    deps: [certs:generate]
    cmds:
      - for: { var: SERVICES }
        cmd: docker build -f services/{{.ITEM}}/deploy/Dockerfile -t {{.ITEM}}:{{.DOCKER_TAG}} .
    silent: true

  docker:run:
    desc: Запуск контейнеров (task docker:run SERVICE=order-service)
    requires:
      vars: [SERVICE]
    cmds:
      - docker run --rm -p 8080:8080
        -e USE_MEMORY=true
        -e JWT_SECRET=dev-jwt-secret-minimum-32-characters-long
        -e TLS_CERT_FILE=/certs/server.crt
        -e TLS_KEY_FILE=/certs/server.key
        -e TLS_CLIENT_CA_FILE=/certs/ca.crt
        {{.SERVICE}}:{{.DOCKER_TAG}}
    silent: true

  certs:generate:
    desc: Generate dev TLS/mTLS certificates
    cmds:
      - bash scripts/certs/generate.sh
    silent: true

  jwt:mint:
    desc: Mint JWT for user UUID (task jwt:mint USER_ID=<uuid>)
    requires:
      vars: [USER_ID]
    env:
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-characters-long}
    cmds:
      - go run ./scripts/jwt/mint.go {{.USER_ID}}
    silent: true

  infra:up:
    desc: Поднять инфраструктуру (PG, Redis, NATS)
    deps: [certs:generate, ensure:env]
    cmds:
      - docker compose --env-file {{.COMPOSE_ENV_FILE}} up -d postgres redis nats
    silent: true

  obs:up:
    desc: Поднять полный стек наблюдаемости
    deps: [certs:generate, ensure:env]
    cmds:
      - docker compose --env-file {{.COMPOSE_ENV_FILE}} up -d --build
    silent: true

  obs:down:
    desc: Остановить стек наблюдаемости
    deps: [ensure:env]
    cmds:
      - docker compose --env-file {{.COMPOSE_ENV_FILE}} down -v
    silent: true

  obs:demo:
    desc: Нагрузочный демо-сценарий для метрик и алертов
    cmds:
      - bash scripts/obs/demo.sh
    silent: true

  infra:down:
    desc: Остановить инфраструктуру
    deps: [ensure:env]
    cmds:
      - docker compose --env-file {{.COMPOSE_ENV_FILE}} down -v
    silent: true
