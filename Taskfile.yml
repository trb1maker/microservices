# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  SERVICES:
    - order-service
  DOCKER_TAG: dev

tasks:
  fmt:
    desc: Форматирование кода
    cmds:
      - golangci-lint fmt ./pkg/...
      - for: { var: SERVICES }
        cmd: golangci-lint fmt ./services/{{.ITEM}}/...
    silent: true

  lint:
    desc: Линтинг кода
    cmds:
      - for: { var: SERVICES }
        cmd: golangci-lint run ./pkg/... ./services/{{.ITEM}}/... --fix --max-same-issues=0
    silent: true

  test:unit:
    desc: Юнит-тестирование
    cmds:
      - go test -v -race ./pkg/...
      - for: { var: SERVICES }
        cmd: go test -v -race ./services/{{.ITEM}}/...
    silent: true

  test:integration:
    desc: Интеграционное тестирование
    cmds:
      - for: { var: SERVICES }
        cmd: go test -tags=integration -timeout 10m ./services/{{.ITEM}}/...
    silent: true

  build:
    desc: Сборка бинарников
    cmds:
      - for: { var: SERVICES }
        cmd: go build -o bin/{{.ITEM}} ./services/{{.ITEM}}/cmd/main.go
    silent: true

  run:
    desc: Запуск сервиса локально (task run SERVICE=order-service)
    requires:
      vars: [SERVICE]
    cmds:
      - go run ./services/{{.SERVICE}}/cmd/main.go
    silent: true

  docker:build:
    desc: Сборка dev-образов
    cmds:
      - for: { var: SERVICES }
        cmd: docker build -f services/{{.ITEM}}/deploy/Dockerfile -t {{.ITEM}}:{{.DOCKER_TAG}} .
    silent: true

  docker:run:
    desc: Запуск контейнеров (task docker:run SERVICE=order-service)
    requires:
      vars: [SERVICE]
    cmds:
      - docker run --rm -p 8080:8080 -e USE_MEMORY=true {{.SERVICE}}:{{.DOCKER_TAG}}
    silent: true

  infra:up:
    desc: Поднять инфраструктуру (PG, Redis, NATS)
    cmds:
      - docker compose up -d postgres redis nats
    silent: true

  obs:up:
    desc: Поднять полный стек наблюдаемости
    cmds:
      - docker compose up -d --build
    silent: true

  obs:down:
    desc: Остановить стек наблюдаемости
    cmds:
      - docker compose down -v
    silent: true

  obs:demo:
    desc: Нагрузочный демо-сценарий для метрик и алертов
    cmds:
      - |
        echo "Generating successful traffic..."
        USER_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
        PRODUCT_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
        echo "{\"product_id\":\"${PRODUCT_ID}\",\"quantity\":1,\"unit_price\":100}" > /tmp/cart-item.json
        curl -s -X POST http://localhost:8080/cart/items -H 'Content-Type: application/json' -H "X-User-ID: ${USER_ID}" -d @/tmp/cart-item.json > /dev/null
        echo '{"delivery_address":"Moscow"}' > /tmp/checkout.json
        for i in $(seq 1 20); do
          curl -s -X POST http://localhost:8080/orders -H 'Content-Type: application/json' -H "X-User-ID: ${USER_ID}" -d @/tmp/checkout.json > /dev/null
        done
        echo "Generating sustained 5xx traffic for alert demo (75s)..."
        for _ in $(seq 1 75); do
          for _ in 1 2 3 4 5; do
            curl -s http://localhost:8080/debug/error > /dev/null &
          done
          wait
          sleep 1
        done
        echo "Done. Check Grafana http://localhost:3000 and Alertmanager http://localhost:9093"
    silent: true

  infra:down:
    desc: Остановить инфраструктуру
    cmds:
      - docker compose down -v
    silent: true
