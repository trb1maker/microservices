groups:
  - name: order-service
    rules:
      - alert: HighHTTPErrorRate
        expr: |
          (
            sum(rate(order_service_http_requests_total{status=~"5.."}[1m]))
            /
            sum(rate(order_service_http_requests_total[1m]))
          ) > 0.05
        for: 1m
        labels:
          severity: warning
          service: order-service
        annotations:
          summary: "HTTP 5xx error rate above 5%"
          description: "More than 5% of HTTP requests returned 5xx status codes over the last minute."
