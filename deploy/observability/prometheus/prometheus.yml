global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: order-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['order-service:8080']
    # Must match METRICS_PATH env in order-service (default: /metrics).
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: nats
    static_configs:
      - targets: ['nats-exporter:7777']
